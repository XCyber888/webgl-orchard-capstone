<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h2>🌳 Magical Fruit Orchard</h2>
        <p>WebGL Capstone Project</p>
        <p id="fps">FPS: 0</p>
        <p id="meshes">Meshes: loading...</p>
        <p id="status">Status: Initializing...</p>
    </div>
    
    <div id="controls">
        <h3>Controls</h3>
        <p><strong>SPACEBAR:</strong> Play/Pause animation</p>
        <p><strong>R:</strong> Reset camera</p>
        <p><strong>+/-:</strong> Speed up/Slow down</p>
    </div>

    <script>
        // ============================================================================
        // MATH LIBRARY
        // ============================================================================
        
        class Vec3 {
            constructor(x = 0, y = 0, z = 0) {
                this.x = x;
                this.y = y;
                this.z = z;
            }
            
            static add(a, b) {
                return new Vec3(a.x + b.x, a.y + b.y, a.z + b.z);
            }
            
            static sub(a, b) {
                return new Vec3(a.x - b.x, a.y - b.y, a.z - b.z);
            }
            
            static mul(v, s) {
                return new Vec3(v.x * s, v.y * s, v.z * s);
            }
            
            static div(v, s) {
                return Vec3.mul(v, 1 / s);
            }
            
            static dot(a, b) {
                return a.x * b.x + a.y * b.y + a.z * b.z;
            }
            
            static cross(a, b) {
                return new Vec3(
                    a.y * b.z - a.z * b.y,
                    a.z * b.x - a.x * b.z,
                    a.x * b.y - a.y * b.x
                );
            }
            
            static length(v) {
                return Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
            }
            
            static normalize(v) {
                const len = Vec3.length(v);
                return len > 0 ? Vec3.div(v, len) : new Vec3();
            }
            
            static lerp(a, b, t) {
                return Vec3.add(a, Vec3.mul(Vec3.sub(b, a), t));
            }
            
            toArray() {
                return [this.x, this.y, this.z];
            }
        }

        class Mat4 {
            constructor(data = null) {
                if (data) {
                    this.data = data;
                } else {
                    this.data = new Float32Array(16);
                    Mat4.identity(this.data);
                }
            }
            
            static identity(m) {
                m[0] = 1; m[1] = 0; m[2] = 0; m[3] = 0;
                m[4] = 0; m[5] = 1; m[6] = 0; m[7] = 0;
                m[8] = 0; m[9] = 0; m[10] = 1; m[11] = 0;
                m[12] = 0; m[13] = 0; m[14] = 0; m[15] = 1;
                return m;
            }
            
            static perspective(fov, aspect, near, far) {
                const f = 1.0 / Math.tan(fov / 2.0);
                const nf = 1.0 / (near - far);
                const m = new Float32Array(16);
                
                m[0] = f / aspect; m[1] = 0; m[2] = 0; m[3] = 0;
                m[4] = 0; m[5] = f; m[6] = 0; m[7] = 0;
                m[8] = 0; m[9] = 0; m[10] = (far + near) * nf; m[11] = -1;
                m[12] = 0; m[13] = 0; m[14] = 2 * far * near * nf; m[15] = 0;
                
                return new Mat4(m);
            }
            
            static lookAt(eye, target, up) {
                const zAxis = Vec3.normalize(Vec3.sub(eye, target));
                const xAxis = Vec3.normalize(Vec3.cross(up, zAxis));
                const yAxis = Vec3.cross(zAxis, xAxis);
                
                const m = new Float32Array(16);
                m[0] = xAxis.x; m[1] = yAxis.x; m[2] = zAxis.x; m[3] = 0;
                m[4] = xAxis.y; m[5] = yAxis.y; m[6] = zAxis.y; m[7] = 0;
                m[8] = xAxis.z; m[9] = yAxis.z; m[10] = zAxis.z; m[11] = 0;
                m[12] = -Vec3.dot(xAxis, eye);
                m[13] = -Vec3.dot(yAxis, eye);
                m[14] = -Vec3.dot(zAxis, eye);
                m[15] = 1;
                
                return new Mat4(m);
            }
            
            static multiply(a, b) {
                const result = new Float32Array(16);
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        result[i * 4 + j] = 0;
                        for (let k = 0; k < 4; k++) {
                            result[i * 4 + j] += a[i * 4 + k] * b[k * 4 + j];
                        }
                    }
                }
                return new Mat4(result);
            }
            
            static translate(m, v) {
                const t = new Float32Array(16);
                Mat4.identity(t);
                t[12] = v.x;
                t[13] = v.y;
                t[14] = v.z;
                return Mat4.multiply(m, new Mat4(t));
            }
            
            static rotateX(m, angle) {
                const c = Math.cos(angle);
                const s = Math.sin(angle);
                const r = new Float32Array(16);
                Mat4.identity(r);
                r[5] = c; r[6] = -s;
                r[9] = s; r[10] = c;
                return Mat4.multiply(m, new Mat4(r));
            }
            
            static rotateY(m, angle) {
                const c = Math.cos(angle);
                const s = Math.sin(angle);
                const r = new Float32Array(16);
                Mat4.identity(r);
                r[0] = c; r[2] = s;
                r[8] = -s; r[10] = c;
                return Mat4.multiply(m, new Mat4(r));
            }
            
            static rotateZ(m, angle) {
                const c = Math.cos(angle);
                const s = Math.sin(angle);
                const r = new Float32Array(16);
                Mat4.identity(r);
                r[0] = c; r[1] = -s;
                r[4] = s; r[5] = c;
                return Mat4.multiply(m, new Mat4(r));
            }
            
            static scale(m, v) {
                const s = new Float32Array(16);
                Mat4.identity(s);
                s[0] = v.x;
                s[5] = v.y;
                s[10] = v.z;
                return Mat4.multiply(m, new Mat4(s));
            }
        }

        // Catmull-Rom Spline
        class CatmullRomSpline {
            constructor(controlPoints) {
                this.controlPoints = controlPoints;
                this.segmentCount = controlPoints.length - 1;
            }
            
            evaluate(t) {
                if (t <= 0) return this.controlPoints[0];
                if (t >= 1) return this.controlPoints[this.controlPoints.length - 1];
                
                const segment = Math.floor(t * (this.controlPoints.length - 1));
                const localT = (t * (this.controlPoints.length - 1)) - segment;
                
                const p0 = this.controlPoints[Math.max(0, segment - 1)];
                const p1 = this.controlPoints[segment];
                const p2 = this.controlPoints[Math.min(segment + 1, this.controlPoints.length - 1)];
                const p3 = this.controlPoints[Math.min(segment + 2, this.controlPoints.length - 1)];
                
                return this.hermite(p0, p1, p2, p3, localT);
            }
            
            hermite(p0, p1, p2, p3, t) {
                const t2 = t * t;
                const t3 = t2 * t;
                
                const h00 = 2 * t3 - 3 * t2 + 1;
                const h10 = t3 - 2 * t2 + t;
                const h01 = -2 * t3 + 3 * t2;
                const h11 = t3 - t2;
                
                const m1 = Vec3.mul(Vec3.sub(p2, p0), 0.5);
                const m2 = Vec3.mul(Vec3.sub(p3, p1), 0.5);
                
                return Vec3.add(
                    Vec3.add(Vec3.mul(p1, h00), Vec3.mul(m1, h10)),
                    Vec3.add(Vec3.mul(p2, h01), Vec3.mul(m2, h11))
                );
            }
            
            getTangent(t) {
                const epsilon = 0.001;
                const p1 = this.evaluate(Math.max(0, t - epsilon));
                const p2 = this.evaluate(Math.min(1, t + epsilon));
                return Vec3.normalize(Vec3.sub(p2, p1));
            }
        }

        // ============================================================================
        // MESH GENERATORS
        // ============================================================================

        class Mesh {
            constructor(vertices, indices, normals, texCoords = null) {
                this.vertices = vertices;
                this.indices = indices;
                this.normals = normals;
                this.texCoords = texCoords;
                this.vertexCount = vertices.length / 3;
                this.indexCount = indices.length;
            }
            
            getVertexArray() {
                return new Float32Array(this.vertices);
            }
            
            getIndexArray() {
                return new Uint32Array(this.indices);
            }
            
            getNormalArray() {
                return new Float32Array(this.normals);
            }
            
            getTexCoordArray() {
                if (!this.texCoords) return null;
                return new Float32Array(this.texCoords);
            }
        }

        function createSphereMesh(radius, segments, rings) {
            const vertices = [];
            const indices = [];
            const normals = [];
            const texCoords = [];
            
            for (let ring = 0; ring <= rings; ring++) {
                const theta = (ring / rings) * Math.PI;
                const sinTheta = Math.sin(theta);
                const cosTheta = Math.cos(theta);
                
                for (let seg = 0; seg <= segments; seg++) {
                    const phi = (seg / segments) * 2 * Math.PI;
                    const sinPhi = Math.sin(phi);
                    const cosPhi = Math.cos(phi);
                    
                    const x = radius * sinTheta * cosPhi;
                    const y = radius * cosTheta;
                    const z = radius * sinTheta * sinPhi;
                    
                    vertices.push(x, y, z);
                    normals.push(sinTheta * cosPhi, cosTheta, sinTheta * sinPhi);
                    texCoords.push(seg / segments, ring / rings);
                }
            }
            
            for (let ring = 0; ring < rings; ring++) {
                for (let seg = 0; seg < segments; seg++) {
                    const a = ring * (segments + 1) + seg;
                    const b = a + 1;
                    const c = a + (segments + 1);
                    const d = c + 1;
                    
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }
            
            return new Mesh(vertices, indices, normals, texCoords);
        }

        function createTorusMesh(majorRadius, minorRadius, majorSegments, minorSegments) {
            const vertices = [];
            const indices = [];
            const normals = [];
            const texCoords = [];
            
            for (let major = 0; major <= majorSegments; major++) {
                const theta = (major / majorSegments) * 2 * Math.PI;
                const sinTheta = Math.sin(theta);
                const cosTheta = Math.cos(theta);
                
                for (let minor = 0; minor <= minorSegments; minor++) {
                    const phi = (minor / minorSegments) * 2 * Math.PI;
                    const sinPhi = Math.sin(phi);
                    const cosPhi = Math.cos(phi);
                    
                    const x = (majorRadius + minorRadius * cosPhi) * cosTheta;
                    const y = minorRadius * sinPhi;
                    const z = (majorRadius + minorRadius * cosPhi) * sinTheta;
                    
                    vertices.push(x, y, z);
                    normals.push(cosPhi * cosTheta, sinPhi, cosPhi * sinTheta);
                    texCoords.push(major / majorSegments, minor / minorSegments);
                }
            }
            
            for (let major = 0; major < majorSegments; major++) {
                for (let minor = 0; minor < minorSegments; minor++) {
                    const a = major * (minorSegments + 1) + minor;
                    const b = a + 1;
                    const c = a + (minorSegments + 1);
                    const d = c + 1;
                    
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }
            
            return new Mesh(vertices, indices, normals, texCoords);
        }

        function createCylinderMesh(radius, height, segments, rings) {
            const vertices = [];
            const indices = [];
            const normals = [];
            const texCoords = [];
            
            for (let ring = 0; ring <= rings; ring++) {
                const y = (ring / rings) * height - height / 2;
                
                for (let seg = 0; seg <= segments; seg++) {
                    const angle = (seg / segments) * 2 * Math.PI;
                    const x = radius * Math.cos(angle);
                    const z = radius * Math.sin(angle);
                    
                    vertices.push(x, y, z);
                    normals.push(Math.cos(angle), 0, Math.sin(angle));
                    texCoords.push(seg / segments, ring / rings);
                }
            }
            
            const baseVertex = vertices.length / 3;
            
            // Top cap
            vertices.push(0, height / 2, 0);
            normals.push(0, 1, 0);
            texCoords.push(0.5, 0.5);
            
            for (let seg = 0; seg <= segments; seg++) {
                const angle = (seg / segments) * 2 * Math.PI;
                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                vertices.push(x, height / 2, z);
                normals.push(0, 1, 0);
                texCoords.push(0.5 + 0.5 * Math.cos(angle), 0.5 + 0.5 * Math.sin(angle));
            }
            
            // Bottom cap
            const bottomCenterIdx = vertices.length / 3;
            vertices.push(0, -height / 2, 0);
            normals.push(0, -1, 0);
            texCoords.push(0.5, 0.5);
            
            for (let seg = 0; seg <= segments; seg++) {
                const angle = (seg / segments) * 2 * Math.PI;
                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                vertices.push(x, -height / 2, z);
                normals.push(0, -1, 0);
                texCoords.push(0.5 + 0.5 * Math.cos(angle), 0.5 + 0.5 * Math.sin(angle));
            }
            
            // Side indices
            for (let ring = 0; ring < rings; ring++) {
                for (let seg = 0; seg < segments; seg++) {
                    const a = ring * (segments + 1) + seg;
                    const b = a + 1;
                    const c = a + (segments + 1);
                    const d = c + 1;
                    
                    indices.push(a, b, c);
                    indices.push(b, d, c);
                }
            }
            
            // Top cap indices
            const topCenterIdx = baseVertex;
            for (let seg = 0; seg < segments; seg++) {
                indices.push(topCenterIdx, topCenterIdx + seg + 1, topCenterIdx + seg + 2);
            }
            
            // Bottom cap indices
            for (let seg = 0; seg < segments; seg++) {
                indices.push(bottomCenterIdx, bottomCenterIdx + seg + 2, bottomCenterIdx + seg + 1);
            }
            
            return new Mesh(vertices, indices, normals, texCoords);
        }

        function createConeMesh(radius, height, segments) {
            const vertices = [];
            const indices = [];
            const normals = [];
            const texCoords = [];
            
            vertices.push(0, height / 2, 0);
            normals.push(0, 1, 0);
            texCoords.push(0.5, 0);
            
            for (let seg = 0; seg <= segments; seg++) {
                const angle = (seg / segments) * 2 * Math.PI;
                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                vertices.push(x, -height / 2, z);
                
                const nx = Math.cos(angle);
                const nz = Math.sin(angle);
                const len = Math.sqrt(nx * nx + nz * nz + (height / radius) * (height / radius));
                normals.push(nx / len, 0, nz / len);
                
                texCoords.push(0.5 + 0.5 * Math.cos(angle), seg / segments);
            }
            
            const baseCenterIdx = vertices.length / 3;
            vertices.push(0, -height / 2, 0);
            normals.push(0, -1, 0);
            texCoords.push(0.5, 0.5);
            
            for (let seg = 0; seg < segments; seg++) {
                indices.push(0, seg + 2, seg + 1);
            }
            
            for (let seg = 0; seg < segments; seg++) {
                indices.push(baseCenterIdx, seg + 2, seg + 1);
            }
            
            return new Mesh(vertices, indices, normals, texCoords);
        }

        function createTerrainMesh(width, depth, resolution) {
            const vertices = [];
            const indices = [];
            const normals = [];
            const texCoords = [];
            
            const xStep = width / resolution;
            const zStep = depth / resolution;
            
            for (let z = 0; z <= resolution; z++) {
                for (let x = 0; x <= resolution; x++) {
                    const px = -width / 2 + x * xStep;
                    const pz = -depth / 2 + z * zStep;
                    
                    const h = Math.sin(px * 0.1) * 0.3 + Math.cos(pz * 0.08) * 0.2 +
                              Math.sin(px * 0.05 + pz * 0.07) * 0.15;
                    
                    vertices.push(px, h, pz);
                    normals.push(0, 1, 0);
                    texCoords.push(x / resolution, z / resolution);
                }
            }
            
            for (let z = 0; z < resolution; z++) {
                for (let x = 0; x < resolution; x++) {
                    const a = z * (resolution + 1) + x;
                    const b = a + 1;
                    const c = a + (resolution + 1);
                    const d = c + 1;
                    
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }
            
            // Recalculate normals
            const recalcNormals = new Array(vertices.length / 3 * 3).fill(0);
            for (let i = 0; i < indices.length; i += 3) {
                const i0 = indices[i];
                const i1 = indices[i + 1];
                const i2 = indices[i + 2];
                
                const v0 = [vertices[i0*3], vertices[i0*3+1], vertices[i0*3+2]];
                const v1 = [vertices[i1*3], vertices[i1*3+1], vertices[i1*3+2]];
                const v2 = [vertices[i2*3], vertices[i2*3+1], vertices[i2*3+2]];
                
                const e1 = [v1[0]-v0[0], v1[1]-v0[1], v1[2]-v0[2]];
                const e2 = [v2[0]-v0[0], v2[1]-v0[1], v2[2]-v0[2]];
                
                const n = [
                    e1[1]*e2[2] - e1[2]*e2[1],
                    e1[2]*e2[0] - e1[0]*e2[2],
                    e1[0]*e2[1] - e1[1]*e2[0]
                ];
                
                recalcNormals[i0*3] += n[0];
                recalcNormals[i0*3+1] += n[1];
                recalcNormals[i0*3+2] += n[2];
                recalcNormals[i1*3] += n[0];
                recalcNormals[i1*3+1] += n[1];
                recalcNormals[i1*3+2] += n[2];
                recalcNormals[i2*3] += n[0];
                recalcNormals[i2*3+1] += n[1];
                recalcNormals[i2*3+2] += n[2];
            }
            
            for (let i = 0; i < recalcNormals.length; i += 3) {
                const len = Math.sqrt(recalcNormals[i]**2 + recalcNormals[i+1]**2 + recalcNormals[i+2]**2);
                if (len > 0) {
                    normals[i] = recalcNormals[i] / len;
                    normals[i+1] = recalcNormals[i+1] / len;
                    normals[i+2] = recalcNormals[i+2] / len;
                }
            }
            
            return new Mesh(vertices, indices, normals, texCoords);
        }

        function createPlaneMesh(width, depth, segments) {
            const vertices = [];
            const indices = [];
            const normals = [];
            const texCoords = [];
            
            const xStep = width / segments;
            const zStep = depth / segments;
            
            for (let z = 0; z <= segments; z++) {
                for (let x = 0; x <= segments; x++) {
                    const px = -width / 2 + x * xStep;
                    const pz = -depth / 2 + z * zStep;
                    
                    vertices.push(px, 0, pz);
                    normals.push(0, 1, 0);
                    texCoords.push(x / segments, z / segments);
                }
            }
            
            for (let z = 0; z < segments; z++) {
                for (let x = 0; x < segments; x++) {
                    const a = z * (segments + 1) + x;
                    const b = a + 1;
                    const c = a + (segments + 1);
                    const d = c + 1;
                    
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }
            
            return new Mesh(vertices, indices, normals, texCoords);
        }

        // ============================================================================
        // SHADERS
        // ============================================================================

        const VERTEX_SHADER = `
#version 300 es
precision highp float;

in vec3 position;
in vec3 normal;
in vec2 texCoord;

out VS_OUT {
    vec3 fragPos;
    vec3 fragNormal;
    vec2 fragTexCoord;
    vec4 fragPosLightSpace;
} vs_out;

uniform mat4 uModel;
uniform mat4 uView;
uniform mat4 uProjection;
uniform mat4 uLightSpaceMatrix;

void main(void) {
    vs_out.fragPos = (uModel * vec4(position, 1.0)).xyz;
    vs_out.fragNormal = normalize((uModel * vec4(normal, 0.0)).xyz);
    vs_out.fragTexCoord = texCoord;
    vs_out.fragPosLightSpace = uLightSpaceMatrix * vec4(vs_out.fragPos, 1.0);
    
    gl_Position = uProjection * uView * vec4(vs_out.fragPos, 1.0);
}
`;

        const FRAGMENT_SHADER = `
#version 300 es
precision highp float;

in VS_OUT {
    vec3 fragPos;
    vec3 fragNormal;
    vec2 fragTexCoord;
    vec4 fragPosLightSpace;
} fs_in;

out vec4 outColor;

uniform sampler2D uShadowMap;
uniform vec3 uCameraPos;
uniform vec3 uSunDirection;
uniform vec3 uSunColor;

const float PI = 3.14159265359;

float shadowCalculation(vec4 fragPosLightSpace) {
    vec3 projCoords = fragPosLightSpace.xyz / fragPosLightSpace.w;
    projCoords = projCoords * 0.5 + 0.5;
    
    if(projCoords.z > 1.0)
        return 1.0;
    
    float closestDepth = texture(uShadowMap, projCoords.xy).r;
    float currentDepth = projCoords.z;
    
    float bias = 0.005;
    float shadow = currentDepth - bias > closestDepth ? 0.3 : 1.0;
    
    return shadow;
}

vec3 blinnPhong(vec3 normal, vec3 viewDir, vec3 lightDir, vec3 color, vec3 albedo) {
    float diff = max(dot(normal, lightDir), 0.0);
    
    vec3 halfDir = normalize(viewDir + lightDir);
    float spec = pow(max(dot(normal, halfDir), 0.0), 32.0);
    
    vec3 diffuse = diff * albedo * color;
    vec3 specular = spec * color * 0.5;
    
    return diffuse + specular;
}

void main(void) {
    vec3 normal = normalize(fs_in.fragNormal);
    vec3 viewDir = normalize(uCameraPos - fs_in.fragPos);
    vec3 lightDir = normalize(uSunDirection);
    
    float shadow = shadowCalculation(fs_in.fragPosLightSpace);
    
    vec3 albedo = mix(vec3(0.2, 0.6, 0.1), vec3(0.8, 0.5, 0.2), 0.3);
    vec3 lighting = blinnPhong(normal, viewDir, lightDir, uSunColor, albedo);
    
    vec3 ambient = vec3(0.2) * albedo;
    
    vec3 color = (ambient + lighting * shadow) * 1.0;
    
    float dist = length(fs_in.fragPos - uCameraPos);
    float fogFactor = exp(-dist * 0.001);
    vec3 fogColor = vec3(0.7, 0.7, 0.8);
    color = mix(fogColor, color, fogFactor);
    
    color = color / (color + vec3(1.0));
    color = pow(color, vec3(1.0/2.2));
    
    outColor = vec4(color, 1.0);
}
`;

        const SHADOW_VERTEX_SHADER = `
#version 300 es
precision highp float;

in vec3 position;

uniform mat4 uLightSpaceMatrix;
uniform mat4 uModel;

void main(void) {
    gl_Position = uLightSpaceMatrix * uModel * vec4(position, 1.0);
}
`;

        const SHADOW_FRAGMENT_SHADER = `
#version 300 es
precision highp float;

void main(void) {
    gl_FragDepth = gl_FragCoord.z;
}
`;

        function compileShader(gl, source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(`Shader compilation error: ${gl.getShaderInfoLog(shader)}`);
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        function createProgram(gl, vertexSource, fragmentSource) {
            const vertexShader = compileShader(gl, vertexSource, gl.VERTEX_SHADER);
            const fragmentShader = compileShader(gl, fragmentSource, gl.FRAGMENT_SHADER);
            
            if (!vertexShader || !fragmentShader) return null;
            
            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error(`Program linking error: ${gl.getProgramInfoLog(program)}`);
                gl.deleteProgram(program);
                return null;
            }
            
            gl.deleteShader(vertexShader);
            gl.deleteShader(fragmentShader);
            
            return program;
        }

        function getUniformLocation(gl, program, name) {
            return gl.getUniformLocation(program, name);
        }

        function getAttribLocation(gl, program, name) {
            return gl.getAttribLocation(program, name);
        }

        // ============================================================================
        // MAIN APPLICATION
        // ============================================================================

        class OrchardScene {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.gl = this.canvas.getContext('webgl2', {
                    antialias: true,
                    depth: true
                });
                
                if (!this.gl) {
                    alert('WebGL2 not supported!');
                    return;
                }
                
                this.setupCanvas();
                this.initGL();
                this.createShaders();
                this.createMeshes();
                this.createScene();
                this.setupSpline();
                this.createShadowFramebuffer();
                
                this.time = 0;
                this.animationSpeed = 1.0;
                this.isAnimating = true;
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                
                this.setupControls();
                this.render();
            }
            
            setupCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                window.addEventListener('resize', () => this.handleResize());
            }
            
            handleResize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.gl.viewport(0, 0, this.canvas.width, this.canvas.height);
            }
            
            initGL() {
                const gl = this.gl;
                
                gl.viewport(0, 0, this.canvas.width, this.canvas.height);
                gl.clearColor(0.7, 0.7, 0.8, 1.0);
                gl.enable(gl.DEPTH_TEST);
                gl.depthFunc(gl.LEQUAL);
                gl.enable(gl.CULL_FACE);
                gl.cullFace(gl.BACK);
            }
            
            createShaders() {
                const gl = this.gl;
                
                this.mainProgram = createProgram(gl, VERTEX_SHADER, FRAGMENT_SHADER);
                this.shadowProgram = createProgram(gl, SHADOW_VERTEX_SHADER, SHADOW_FRAGMENT_SHADER);
                
                if (!this.mainProgram || !this.shadowProgram) {
                    console.error('Failed to create shader programs');
                }
            }
            
            createMeshes() {
                this.meshes = {
                    sphere: createSphereMesh(1.0, 32, 16),
                    torus: createTorusMesh(1.0, 0.3, 32, 16),
                    cylinder: createCylinderMesh(0.5, 3.0, 16, 8),
                    cone: createConeMesh(2.0, 4.0, 16),
                    terrain: createTerrainMesh(100, 100, 32),
                    plane: createPlaneMesh(50, 50, 8)
                };
                
                this.buffers = {};
                for (const [name, mesh] of Object.entries(this.meshes)) {
                    this.buffers[name] = this.createMeshBuffers(mesh);
                }
            }
            
            createMeshBuffers(mesh) {
                const gl = this.gl;
                
                const vao = gl.createVertexArray();
                gl.bindVertexArray(vao);
                
                // Vertex positions
                const posVBO = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, posVBO);
                gl.bufferData(gl.ARRAY_BUFFER, mesh.getVertexArray(), gl.STATIC_DRAW);
                
                const posLoc = getAttribLocation(this.gl, this.mainProgram, 'position');
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 12, 0);
                
                // Vertex normals
                const normVBO = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, normVBO);
                gl.bufferData(gl.ARRAY_BUFFER, mesh.getNormalArray(), gl.STATIC_DRAW);
                
                const normLoc = getAttribLocation(this.gl, this.mainProgram, 'normal');
                gl.enableVertexAttribArray(normLoc);
                gl.vertexAttribPointer(normLoc, 3, gl.FLOAT, false, 12, 0);
                
                // Texture coordinates
                let texVBO = null;
                const texCoords = mesh.getTexCoordArray();
                if (texCoords) {
                    texVBO = gl.createBuffer();
                    gl.bindBuffer(gl.ARRAY_BUFFER, texVBO);
                    gl.bufferData(gl.ARRAY_BUFFER, texCoords, gl.STATIC_DRAW);
                    
                    const texLoc = getAttribLocation(this.gl, this.mainProgram, 'texCoord');
                    gl.enableVertexAttribArray(texLoc);
                    gl.vertexAttribPointer(texLoc, 2, gl.FLOAT, false, 8, 0);
                }
                
                // Index buffer
                const ebo = gl.createBuffer();
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ebo);
                gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.getIndexArray(), gl.STATIC_DRAW);
                
                gl.bindVertexArray(null);
                
                return {
                    vao: vao,
                    posVBO: posVBO,
                    normVBO: normVBO,
                    texVBO: texVBO,
                    ebo: ebo,
                    indexCount: mesh.indexCount
                };
            }
            
            createShadowFramebuffer() {
                const gl = this.gl;
                
                this.shadowFramebuffer = gl.createFramebuffer();
                gl.bindFramebuffer(gl.FRAMEBUFFER, this.shadowFramebuffer);
                
                this.shadowTexture = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, this.shadowTexture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT24, 1024, 1024, 0, gl.DEPTH_COMPONENT, gl.UNSIGNED_INT, null);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                
                gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.TEXTURE_2D, this.shadowTexture, 0);
                
                if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) {
                    console.error('Shadow framebuffer incomplete');
                }
                
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            }
            
            createScene() {
                this.objects = [];
                
                // Terrain
                this.objects.push({
                    mesh: 'terrain',
                    position: new Vec3(0, -1, 0),
                    scale: new Vec3(1, 1, 1),
                    rotation: new Vec3(0, 0, 0)
                });
                
                // Trees
                for (let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2;
                    const dist = 20;
                    
                    this.objects.push({
                        mesh: 'cylinder',
                        position: new Vec3(Math.cos(angle) * dist, 0, Math.sin(angle) * dist),
                        scale: new Vec3(1, 1.5, 1),
                        rotation: new Vec3(0, 0, 0)
                    });
                    
                    this.objects.push({
                        mesh: 'cone',
                        position: new Vec3(Math.cos(angle) * dist, 2, Math.sin(angle) * dist),
                        scale: new Vec3(1.2, 1.2, 1.2),
                        rotation: new Vec3(0, 0, 0)
                    });
                }
                
                // Fruits
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const dist = 25;
                    const height = Math.sin(i * 0.5) * 2 + 3;
                    
                    this.objects.push({
                        mesh: 'sphere',
                        position: new Vec3(Math.cos(angle) * dist, height, Math.sin(angle) * dist),
                        scale: new Vec3(0.5, 0.5, 0.5),
                        rotation: new Vec3(0, 0, 0)
                    });
                }
                
                // Water surface
                this.objects.push({
                    mesh: 'plane',
                    position: new Vec3(0, -2, 0),
                    scale: new Vec3(1, 1, 1),
                    rotation: new Vec3(0, 0, 0),
                    reflective: true
                });
            }
            
            setupSpline() {
                const controlPoints = [
                    new Vec3(30, 5, 0),
                    new Vec3(20, 5, 20),
                    new Vec3(-20, 5, 30),
                    new Vec3(-30, 5, 10),
                    new Vec3(-20, 5, -20),
                    new Vec3(20, 5, -30),
                    new Vec3(30, 5, 0)
                ];
                
                this.spline = new CatmullRomSpline(controlPoints);
            }
            
            setupControls() {
                window.addEventListener('keydown', (e) => {
                    switch (e.code) {
                        case 'Space':
                            this.isAnimating = !this.isAnimating;
                            break;
                        case 'KeyR':
                            this.time = 0;
                            break;
                        case 'Equal':
                            this.animationSpeed = Math.min(2.0, this.animationSpeed + 0.1);
                            break;
                        case 'Minus':
                            this.animationSpeed = Math.max(0.1, this.animationSpeed - 0.1);
                            break;
                    }
                });
            }
            
            render() {
                const currentTime = performance.now();
                const deltaTime = (currentTime - this.lastTime) / 1000;
                this.lastTime = currentTime;
                
                if (this.isAnimating) {
                    this.time += deltaTime * this.animationSpeed;
                }
                
                this.frameCount++;
                if (this.frameCount % 30 === 0) {
                    this.fps = Math.round(1 / deltaTime);
                    document.getElementById('fps').textContent = `FPS: ${this.fps}`;
                }
                
                this.updateCamera();
                this.updateScene();
                this.renderShadowMap();
                this.renderScene();
                
                requestAnimationFrame(() => this.render());
            }
            
            updateCamera() {
                const t = (this.time % 10) / 10;
                this.cameraPos = this.spline.evaluate(t);
                this.cameraPos.y += 2;
                
                const lookT = Math.min(1, t + 0.05);
                this.lookTarget = this.spline.evaluate(lookT);
                this.lookTarget.y += 2;
            }
            
            updateScene() {
                for (let i = 0; i < this.objects.length; i++) {
                    const obj = this.objects[i];
                    obj.rotation.y += 0.01;
                }
            }
            
            renderShadowMap() {
                const gl = this.gl;
                
                gl.bindFramebuffer(gl.FRAMEBUFFER, this.shadowFramebuffer);
                gl.viewport(0, 0, 1024, 1024);
                gl.clear(gl.DEPTH_BUFFER_BIT);
                
                gl.useProgram(this.shadowProgram);
                
                const lightPos = new Vec3(50, 50, 50);
                const lightView = Mat4.lookAt(lightPos, new Vec3(0, 0, 0), new Vec3(0, 1, 0));
                const lightProjection = Mat4.perspective(Math.PI / 4, 1, 0.1, 1000);
                const lightSpaceMatrix = Mat4.multiply(lightProjection, lightView);
                
                const modelLoc = getUniformLocation(gl, this.shadowProgram, 'uModel');
                const lsLoc = getUniformLocation(gl, this.shadowProgram, 'uLightSpaceMatrix');
                
                gl.uniformMatrix4fv(lsLoc, false, lightSpaceMatrix.data);
                
                for (const obj of this.objects) {
                    let model = new Mat4();
                    model = Mat4.translate(model, obj.position);
                    model = Mat4.rotateX(model, obj.rotation.x);
                    model = Mat4.rotateY(model, obj.rotation.y);
                    model = Mat4.rotateZ(model, obj.rotation.z);
                    model = Mat4.scale(model, obj.scale);
                    
                    gl.uniformMatrix4fv(modelLoc, false, model.data);
                    
                    const buffer = this.buffers[obj.mesh];
                    gl.bindVertexArray(buffer.vao);
                    gl.drawElements(gl.TRIANGLES, buffer.indexCount, gl.UNSIGNED_INT, 0);
                }
                
                this.lightSpaceMatrix = lightSpaceMatrix;
                
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                gl.viewport(0, 0, this.canvas.width, this.canvas.height);
            }
            
            renderScene() {
                const gl = this.gl;
                
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                
                const projection = Mat4.perspective(Math.PI / 4, this.canvas.width / this.canvas.height, 0.1, 1000);
                const view = Mat4.lookAt(this.cameraPos, this.lookTarget, new Vec3(0, 1, 0));
                
                gl.useProgram(this.mainProgram);
                
                const projLoc = getUniformLocation(gl, this.mainProgram, 'uProjection');
                const viewLoc = getUniformLocation(gl, this.mainProgram, 'uView');
                const modelLoc = getUniformLocation(gl, this.mainProgram, 'uModel');
                const cameraPosLoc = getUniformLocation(gl, this.mainProgram, 'uCameraPos');
                const sunDirLoc = getUniformLocation(gl, this.mainProgram, 'uSunDirection');
                const sunColorLoc = getUniformLocation(gl, this.mainProgram, 'uSunColor');
                const lsLoc = getUniformLocation(gl, this.mainProgram, 'uLightSpaceMatrix');
                const shadowMapLoc = getUniformLocation(gl, this.mainProgram, 'uShadowMap');
                
                gl.uniformMatrix4fv(projLoc, false, projection.data);
                gl.uniformMatrix4fv(viewLoc, false, view.data);
                gl.uniformMatrix4fv(lsLoc, false, this.lightSpaceMatrix.data);
                gl.uniform3fv(cameraPosLoc, this.cameraPos.toArray());
                gl.uniform3fv(sunDirLoc, Vec3.normalize(new Vec3(0.8, 1, 0.5)).toArray());
                gl.uniform3fv(sunColorLoc, [1.0, 0.9, 0.8]);
                
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, this.shadowTexture);
                gl.uniform1i(shadowMapLoc, 0);
                
                for (const obj of this.objects) {
                    let model = new Mat4();
                    model = Mat4.translate(model, obj.position);
                    model = Mat4.rotateX(model, obj.rotation.x);
                    model = Mat4.rotateY(model, obj.rotation.y);
                    model = Mat4.rotateZ(model, obj.rotation.z);
                    model = Mat4.scale(model, obj.scale);
                    
                    gl.uniformMatrix4fv(modelLoc, false, model.data);
                    
                    const buffer = this.buffers[obj.mesh];
                    gl.bindVertexArray(buffer.vao);
                    gl.drawElements(gl.TRIANGLES, buffer.indexCount, gl.UNSIGNED_INT, 0);
                }
                
                gl.bindVertexArray(null);
            }
        }

        // Initialization
        window.addEventListener('DOMContentLoaded', () => {
            const scene = new OrchardScene();
            
            document.getElementById('status').textContent = 'Status: Running';
            document.getElementById('meshes').textContent = `Meshes: ${Object.keys(scene.meshes).length}`;
            
            console.log('🌳 Orchard Scene Initialized');
            console.log('Available meshes:', Object.keys(scene.meshes));
            console.log('Objects in scene:', scene.objects.length);
        });
    </script>
</body>
